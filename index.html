<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Haneul Palette</title>
  <link rel="stylesheet" href="style.css">

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="container">

  <img src="logo.png" class="logo" />

  <h1>Haneul Palette</h1>
  <p class="subtitle">Premium Korean Color Analysis</p>

  <input type="file" id="imageInput" accept="image/*">

  <button onclick="analyzeImage()">Analyze</button>

  <div id="loading" class="hidden">Analyzing...</div>

  <div id="results" class="hidden">
    <h2>Results</h2>
    <p><b>ID:</b> <span id="analysisId"></span></p>

    <div id="analysisText"></div>

    <button onclick="downloadPDF()">Download Premium PDF</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
