<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Haneul Palette – Premium Color Analysis</title>
  <link rel="stylesheet" href="style.css" />

  <!-- PDF Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="container">

  <img src="logo.png" class="logo" />

  <h1>Premium Korean Color Analysis</h1>
  <p class="subtitle">Upload one clear selfie in natural light</p>

  <input type="file" id="imageInput" accept="image/*" />

  <button onclick="analyzeImage()">Analyze My Face</button>

  <div id="loading" class="hidden">Analyzing… please wait</div>

  <div id="results" class="hidden">

    <h2>Your Results</h2>

    <p><b>Analysis ID:</b> <span id="analysisId"></span></p>

    <div id="analysisText"></div>

    <button onclick="downloadPDF()" class="downloadBtn">
      Download Full Report (PDF)
    </button>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
